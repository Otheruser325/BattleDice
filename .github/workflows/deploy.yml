name: Deploy Vite App to GitHub Pages

on:
  push:
    branches: ['main'] # Change to 'master' if needed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        env:
          REPO_FIX: ${{ vars.REPO_FIX }}
          VITE_RIVALIS_WS_URL: ${{ vars.VITE_RIVALIS_WS_URL }}
          VITE_RIVALIS_TICKET: ${{ secrets.VITE_RIVALIS_TICKET }}
          VITE_RIVALIS_TICKET_SOURCE: ${{ vars.VITE_RIVALIS_TICKET_SOURCE }}
          VITE_RIVALIS_RECONNECT_MAX: ${{ vars.VITE_RIVALIS_RECONNECT_MAX }}
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite outputs to 'dist' by default

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
